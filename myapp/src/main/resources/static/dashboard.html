<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Grupos - Tricount Clone</title>
    <style>
        :root {
            --bg: #f6f8ff;
            --card: #ffffff;
            --accent: #1f7ae0;
            --accent-soft: #e5f0ff;
            --ok: #1f9f58;
            --danger: #d73a49;
            --muted: #5b6676;
            --border: #dfe5ef;
            --text: #1f2a37;
            --neutral: #7a8596;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px;
            margin: 0;
            background: linear-gradient(145deg, #f4f8ff 0%, #eaf7f1 100%);
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 18px 40px rgba(31, 42, 55, 0.08);
        }

        .volver {
            margin-bottom: 12px;
            display: inline-block;
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
        }

        h2, h3 {
            margin-top: 0;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab-btn {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .panel {
            display: none;
            margin-top: 10px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fbfdff;
        }

        .panel.active {
            display: block;
        }

        .seccion {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent-soft);
            border: 1px solid #d2e6ff;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        input,
        select {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            min-width: 150px;
        }

        button {
            padding: 8px 14px;
            background: var(--ok);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.14s ease, box-shadow 0.14s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .btn-accent {
            background: var(--accent);
        }

        .btn-info {
            background: #17a2b8;
        }

        .btn-danger {
            background: var(--danger);
        }

        .msg {
            margin-top: 6px;
            font-size: 0.9em;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.9em;
        }

        .gasto {
            background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
        }

        .gasto-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .monto {
            font-weight: 700;
            color: var(--ok);
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .tag-categoria {
            background: #fff8e8;
            color: #99600f;
            border: 1px solid #f8db8d;
        }

        .tag-emote {
            background: #eef7ff;
            color: #1f4d7a;
            border: 1px solid #c6ddf7;
        }

        .tag-participantes {
            background: #eefcf4;
            color: #1c7c45;
            border: 1px solid #bfe8cf;
        }

        .crear-form {
            display: none;
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
        }

        .crear-form.open {
            display: block;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .full {
            grid-column: 1 / -1;
        }

        .emote-picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .selected-emote-preview {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--muted);
            font-size: 0.9em;
        }

        .selected-emote-preview strong {
            color: var(--text);
        }

        .emote-panel {
            display: none;
            padding: 10px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
        }

        .emote-panel.open {
            display: block;
        }

        .emote-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 6px;
        }

        .emote-btn {
            background: #fff;
            color: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
        }

        .emote-btn.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(31, 122, 224, 0.2);
            background: #f1f7ff;
        }

        .participantes-box {
            display: none;
            padding: 10px;
            border: 1px dashed #b4c7de;
            border-radius: 10px;
            background: #f8fbff;
            max-height: 140px;
            overflow: auto;
        }

        .participantes-box.open {
            display: block;
        }

        .check-item {
            display: block;
            margin-bottom: 6px;
            font-size: 0.94em;
        }

        .balance-list,
        .sol-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .balance-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }

        .balance-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95em;
            flex-shrink: 0;
            color: white;
        }

        .balance-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.97em;
        }

        .balance-amount {
            font-weight: 700;
            font-size: 1.05em;
        }

        .estado-positivo .balance-avatar { background: var(--ok); }
        .estado-positivo .balance-amount { color: var(--ok); }
        .estado-debe .balance-avatar { background: var(--danger); }
        .estado-debe .balance-amount { color: var(--danger); }
        .estado-equilibrado .balance-avatar { background: var(--neutral); }
        .estado-equilibrado .balance-amount { color: var(--neutral); }

        .sol-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            font-size: 0.95em;
            flex-wrap: wrap;
        }

        .sol-de, .sol-a { font-weight: 600; }
        .sol-a { color: var(--ok); }

        .sol-monto {
            font-weight: 700;
            color: var(--danger);
            background: #fdecea;
            padding: 2px 9px;
            border-radius: 20px;
        }

        .sol-flecha {
            color: var(--muted);
            font-size: 1em;
        }

        .hint {
            color: var(--muted);
            font-size: 0.87em;
            margin: 2px 0 8px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-wrap: nowrap;
        }

        .header h2 {
            margin: 0;
        }

        .btn-logout {
            background: var(--danger);
            white-space: nowrap;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .btn-delete-account {
            background: #6c757d;
            white-space: nowrap;
        }

        .form-grupo {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #fff;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
        }

        .grupo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .grupo-nombre {
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .grupo-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .moneda-tag {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        .mensaje-grupo {
            margin-top: 8px;
            font-size: 0.9em;
        }

        .rename-form {
            display: none;
            margin-top: 10px;
        }

        .rename-form.visible {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .rename-form input {
            flex: 1 1 220px;
            margin: 0;
        }

        .btn-rename-toggle {
            background: #6c757d;
        }

        .btn-rename {
            background: var(--accent);
        }

        .btn-cancel {
            background: var(--danger);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-card {
            background: #fff;
            width: min(460px, 100%);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-card h3 {
            margin: 0 0 10px;
        }

        .modal-card p {
            margin: 0 0 14px;
            color: var(--muted);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-modal-cancel {
            background: #6c757d;
        }

        .btn-modal-delete {
            background: var(--danger);
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .emote-grid {
                grid-template-columns: repeat(7, minmax(0, 1fr));
            }

            .header {
                flex-wrap: wrap;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Hola, <span id="userSpan"></span></h2>
            <div class="header-actions">
                <button class="btn-delete-account" onclick="abrirModalEliminarCuenta()">Eliminar cuenta</button>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="form-grupo">
            <h3>Crear nuevo grupo</h3>
            <input type="text" id="nombreGrupo" placeholder="Nombre del viaje/cena">
            <select id="monedaGrupo">
                <option value="">Cargando monedas...</option>
            </select>
            <button onclick="crearGrupo()">Crear</button>
            <p id="statusMsg"></p>
        </div>

        <h3>Mis Grupos</h3>
        <ul id="listaGrupos">
            </ul>
    </div>

    <div id="deleteAccountModal" class="modal-overlay" onclick="cerrarModalEliminarCuenta(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>Eliminar cuenta</h3>
            <p>Estas seguro que quieres eliminar tu cuenta y todos tus datos?</p>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="cerrarModalEliminarCuenta()">Cancelar</button>
                <button class="btn-modal-delete" onclick="confirmarEliminarCuenta()">Si, eliminar</button>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');

        // Verificación de sesión
        if (!userId) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userSpan').textContent = username;
        }

        // Ejecutar al cargar la página
        window.onload = () => {
            cargarMonedas();
            cargarGrupos();
        };

        // 1. Cargar monedas desde el Enum de Java
        async function cargarMonedas() {
            try {
                const resp = await fetch('/api/grupos/monedas');
                const monedas = await resp.json();
                const select = document.getElementById('monedaGrupo');
                
                select.innerHTML = ""; // Limpiar el "Cargando..."
                monedas.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Error cargando monedas:", err);
            }
        }

        // 2. Cargar los grupos del usuario
        async function cargarGrupos() {
            const lista = document.getElementById('listaGrupos');

            try {
                const resp = await fetch(`/api/grupos/usuario/${userId}`);
                if (!resp.ok) throw new Error("No se pudieron cargar los grupos");

                const grupos = await resp.json();
                lista.innerHTML = "";

                if (grupos.length === 0) {
                    lista.innerHTML = "<li>No tienes grupos todavía.</li>";
                    return;
                }

                grupos.forEach(g => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="grupo-header">
                           <a href="grupo.html?id=${g.id}" class="grupo-nombre" id="nombre-texto-${g.id}">${g.nombre}</a>
                            <span class="moneda-tag">${g.moneda}</span>
                        </div>
                        <div class="grupo-actions">
                            <button class="btn-rename-toggle" onclick="toggleRename(${g.id})">Cambiar nombre</button>
                        </div>
                        <div class="rename-form" id="rename-form-${g.id}">
                            <input type="text" id="rename-${g.id}" placeholder="Nuevo nombre del grupo">
                            <button class="btn-rename" onclick="renombrarGrupo(${g.id})">Guardar</button>
                            <button class="btn-cancel" onclick="toggleRename(${g.id})">Cancelar</button>
                        </div>
                        <div class="mensaje-grupo" id="msg-grupo-${g.id}"></div>
                    `;
                    lista.appendChild(li);
                });
            } catch (err) {
                lista.innerHTML = "<li>No se pudieron cargar tus grupos.</li>";
                console.error("Error:", err);
            }
        }

        // 3. Crear nuevo grupo
        async function crearGrupo() {
            const nombre = document.getElementById('nombreGrupo').value.trim();
            const moneda = document.getElementById('monedaGrupo').value;
            const status = document.getElementById('statusMsg');

            if (!nombre) {
                status.textContent = "Ponle un nombre al grupo";
                status.style.color = "red";
                return;
            }

            if (!moneda) {
                status.textContent = "Selecciona una moneda";
                status.style.color = "red";
                return;
            }

            const payload = {
                nombre: nombre,
                moneda: moneda,
                idCreador: Number(userId)
            };

            try {
                const resp = await fetch('/api/grupos/crear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    status.textContent = "¡Grupo creado con éxito!";
                    status.style.color = "green";
                    document.getElementById('nombreGrupo').value = "";
                    await cargarGrupos();
                } else {
                    const error = await resp.text();
                    status.textContent = "Error: " + error;
                    status.style.color = "red";
                }
            } catch (err) {
                status.textContent = "Error de conexión.";
                status.style.color = "red";
            }
        }

        function toggleRename(grupoId) {
            const form = document.getElementById(`rename-form-${grupoId}`);
            const input = document.getElementById(`rename-${grupoId}`);
            const isVisible = form.classList.toggle('visible');
            if (isVisible) input.focus();
            document.getElementById(`msg-grupo-${grupoId}`).textContent = '';
        }

        async function renombrarGrupo(grupoId) {
            const input = document.getElementById(`rename-${grupoId}`);
            const mensaje = document.getElementById(`msg-grupo-${grupoId}`);
            const nombre = input.value.trim();

            if (!nombre) {
                mensaje.textContent = "El nombre no puede estar vacío.";
                mensaje.style.color = "red";
                return;
            }

            try {
                const resp = await fetch(`/api/grupos/${grupoId}/nombre`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, idUsuario: Number(userId) })
                });

                if (resp.ok) {
                    mensaje.textContent = "Nombre actualizado correctamente.";
                    mensaje.style.color = "green";
                    document.getElementById(`rename-form-${grupoId}`).classList.remove('visible');
                    document.getElementById(`nombre-texto-${grupoId}`).textContent = nombre;
                } else {
                    const error = await resp.text();
                    mensaje.textContent = "Error: " + error;
                    mensaje.style.color = "red";
                }
            } catch (err) {
                mensaje.textContent = "Error de conexión.";
                mensaje.style.color = "red";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function abrirModalEliminarCuenta() {
            document.getElementById('deleteAccountModal').classList.add('open');
        }

        function cerrarModalEliminarCuenta(event) {
            if (!event || event.target.id === 'deleteAccountModal') {
                document.getElementById('deleteAccountModal').classList.remove('open');
            }
        }

        async function confirmarEliminarCuenta() {
            try {
                const resp = await fetch(`/api/usuarios/${userId}`, {
                    method: 'DELETE'
                });

                if (!resp.ok) {
                    const error = await resp.text();
                    alert('No se pudo eliminar la cuenta: ' + error);
                    return;
                }

                localStorage.clear();
                window.location.href = 'index.html';
            } catch (err) {
                alert('Error de conexión al eliminar la cuenta.');
            }
        }
    </script>
</body>
</html>
