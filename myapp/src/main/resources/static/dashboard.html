<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Grupos - Tricount Clone</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 720px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; gap: 12px; }
        .form-grupo { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; }
        input, select { padding: 8px; margin-right: 10px; margin-bottom: 10px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn-logout { background: #dc3545; }
        .btn-rename { background: #007bff; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 12px; padding: 12px; border-radius: 8px; }
        .grupo-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .grupo-nombre { font-weight: bold; }
        .grupo-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .grupo-actions input { margin: 0; flex: 1 1 220px; }
        .moneda-tag { background: #007bff; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }
        .mensaje-grupo { margin-top: 8px; font-size: 0.9em; }
        .rename-form { display: none; margin-top: 10px; }
        .rename-form.visible { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .rename-form input { flex: 1 1 220px; margin: 0; }
        .btn-rename-toggle { background: #6c757d; }
        .btn-cancel { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Hola, <span id="userSpan"></span></h2>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="form-grupo">
            <h3>Crear nuevo grupo</h3>
            <input type="text" id="nombreGrupo" placeholder="Nombre del viaje/cena">
            <select id="monedaGrupo">
                <option value="">Cargando monedas...</option>
            </select>
            <button onclick="crearGrupo()">Crear</button>
            <p id="statusMsg"></p>
        </div>

        <h3>Mis Grupos</h3>
        <ul id="listaGrupos">
            </ul>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');

        // Verificación de sesión
        if (!userId) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userSpan').textContent = username;
        }

        // Ejecutar al cargar la página
        window.onload = () => {
            cargarMonedas();
            cargarGrupos();
        };

        // 1. Cargar monedas desde el Enum de Java
        async function cargarMonedas() {
            try {
                const resp = await fetch('/api/grupos/monedas');
                const monedas = await resp.json();
                const select = document.getElementById('monedaGrupo');
                
                select.innerHTML = ""; // Limpiar el "Cargando..."
                monedas.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Error cargando monedas:", err);
            }
        }

        // 2. Cargar los grupos del usuario
        async function cargarGrupos() {
            const lista = document.getElementById('listaGrupos');

            try {
                const resp = await fetch(`/api/grupos/usuario/${userId}`);
                if (!resp.ok) throw new Error("No se pudieron cargar los grupos");

                const grupos = await resp.json();
                lista.innerHTML = "";

                if (grupos.length === 0) {
                    lista.innerHTML = "<li>No tienes grupos todavía.</li>";
                    return;
                }

                grupos.forEach(g => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="grupo-header">
                            <span class="grupo-nombre" id="nombre-texto-${g.id}">${g.nombre}</span>
                            <span class="moneda-tag">${g.moneda}</span>
                        </div>
                        <div class="grupo-actions">
                            <button class="btn-rename-toggle" onclick="toggleRename(${g.id})">Cambiar nombre</button>
                        </div>
                        <div class="rename-form" id="rename-form-${g.id}">
                            <input type="text" id="rename-${g.id}" placeholder="Nuevo nombre del grupo">
                            <button class="btn-rename" onclick="renombrarGrupo(${g.id})">Guardar</button>
                            <button class="btn-cancel" onclick="toggleRename(${g.id})">Cancelar</button>
                        </div>
                        <div class="mensaje-grupo" id="msg-grupo-${g.id}"></div>
                    `;
                    lista.appendChild(li);
                });
            } catch (err) {
                lista.innerHTML = "<li>No se pudieron cargar tus grupos.</li>";
                console.error("Error:", err);
            }
        }

        // 3. Crear nuevo grupo
        async function crearGrupo() {
            const nombre = document.getElementById('nombreGrupo').value.trim();
            const moneda = document.getElementById('monedaGrupo').value;
            const status = document.getElementById('statusMsg');

            if (!nombre) {
                status.textContent = "Ponle un nombre al grupo";
                status.style.color = "red";
                return;
            }

            if (!moneda) {
                status.textContent = "Selecciona una moneda";
                status.style.color = "red";
                return;
            }

            const payload = {
                nombre: nombre,
                moneda: moneda,
                idCreador: Number(userId)
            };

            try {
                const resp = await fetch('/api/grupos/crear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    status.textContent = "¡Grupo creado con éxito!";
                    status.style.color = "green";
                    document.getElementById('nombreGrupo').value = "";
                    await cargarGrupos();
                } else {
                    const error = await resp.text();
                    status.textContent = "Error: " + error;
                    status.style.color = "red";
                }
            } catch (err) {
                status.textContent = "Error de conexión.";
                status.style.color = "red";
            }
        }

        function toggleRename(grupoId) {
            const form = document.getElementById(`rename-form-${grupoId}`);
            const input = document.getElementById(`rename-${grupoId}`);
            const isVisible = form.classList.toggle('visible');
            if (isVisible) input.focus();
            document.getElementById(`msg-grupo-${grupoId}`).textContent = '';
        }

        async function renombrarGrupo(grupoId) {
            const input = document.getElementById(`rename-${grupoId}`);
            const mensaje = document.getElementById(`msg-grupo-${grupoId}`);
            const nombre = input.value.trim();

            if (!nombre) {
                mensaje.textContent = "El nombre no puede estar vacío.";
                mensaje.style.color = "red";
                return;
            }

            try {
                const resp = await fetch(`/api/grupos/${grupoId}/nombre`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, idUsuario: Number(userId) })
                });

                if (resp.ok) {
                    mensaje.textContent = "Nombre actualizado correctamente.";
                    mensaje.style.color = "green";
                    document.getElementById(`rename-form-${grupoId}`).classList.remove('visible');
                    document.getElementById(`nombre-texto-${grupoId}`).textContent = nombre;
                } else {
                    const error = await resp.text();
                    mensaje.textContent = "Error: " + error;
                    mensaje.style.color = "red";
                }
            } catch (err) {
                mensaje.textContent = "Error de conexión.";
                mensaje.style.color = "red";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
