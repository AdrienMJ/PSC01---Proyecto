<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Grupos - Tricount Clone</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-grupo { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; }
        input, select { padding: 8px; margin-right: 10px; margin-bottom: 10px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn-logout { background: #dc3545; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 5px; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .moneda-tag { background: #007bff; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Hola, <span id="userSpan"></span></h2>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="form-grupo">
            <h3>Crear nuevo grupo</h3>
            <input type="text" id="nombreGrupo" placeholder="Nombre del viaje/cena">
            <select id="monedaGrupo">
                <option value="">Cargando monedas...</option>
            </select>
            <button onclick="crearGrupo()">Crear</button>
            <p id="statusMsg"></p>
        </div>

        <h3>Mis Grupos</h3>
        <ul id="listaGrupos">
            </ul>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');

        // Verificación de sesión
        if (!userId) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userSpan').textContent = username;
        }

        // Ejecutar al cargar la página
        window.onload = () => {
            cargarMonedas();
            cargarGrupos();
        };

        // 1. Cargar monedas desde el Enum de Java
        async function cargarMonedas() {
            try {
                const resp = await fetch('/api/grupos/monedas');
                const monedas = await resp.json();
                const select = document.getElementById('monedaGrupo');
                
                select.innerHTML = ""; // Limpiar el "Cargando..."
                monedas.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Error cargando monedas:", err);
            }
        }

        // 2. Cargar los grupos del usuario
        async function cargarGrupos() {
            try {
                const resp = await fetch(`/api/grupos/usuario/${userId}`);
                if (!resp.ok) throw new Error("No se pudieron cargar los grupos");
                
                const grupos = await resp.json();
                const lista = document.getElementById('listaGrupos');
                lista.innerHTML = ""; 

                if (grupos.length === 0) {
                    lista.innerHTML = "<li>No tienes grupos todavía.</li>";
                }

                grupos.forEach(g => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${g.nombre}</span>
                        <span class="moneda-tag">${g.moneda}</span>
                    `;
                    lista.appendChild(li);
                });
            } catch (err) {
                console.error("Error:", err);
            }
        }

        // 3. Crear nuevo grupo
        async function crearGrupo() {
            const nombre = document.getElementById('nombreGrupo').value;
            const moneda = document.getElementById('monedaGrupo').value;
            const status = document.getElementById('statusMsg');

            if (!nombre) {
                status.textContent = "Ponle un nombre al grupo";
                status.style.color = "red";
                return;
            }

            const payload = {
                nombre: nombre,
                moneda: moneda,
                idCreador: userId
            };

            try {
                const resp = await fetch('/api/grupos/crear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    status.textContent = "¡Grupo creado con éxito!";
                    status.style.color = "green";
                    document.getElementById('nombreGrupo').value = ""; // Limpia el input
                    
                    // ESTO ES LO QUE HACE QUE APAREZCA DEBAJO
                    cargarGrupos(); 
                } else {
                    const error = await resp.text();
                    status.textContent = "Error: " + error;
                    status.style.color = "red";
                }
            } catch (err) {
                status.textContent = "Error de conexión.";
                status.style.color = "red";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
