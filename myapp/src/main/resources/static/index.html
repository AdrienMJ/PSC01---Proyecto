<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tricount - Inicio</title>
    <style>
        :root {
            --bg: #f6f8ff;
            --card: #ffffff;
            --accent: #1f7ae0;
            --accent-soft: #e5f0ff;
            --ok: #1f9f58;
            --danger: #d73a49;
            --muted: #5b6676;
            --border: #dfe5ef;
            --text: #1f2a37;
            --neutral: #7a8596;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #f4f8ff 0%, #eaf7f1 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-container {
            width: 100%;
            max-width: 900px;
            padding: 24px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section h1 {
            font-size: 2.2em;
            margin: 0;
            color: var(--accent);
        }

        .logo-section p {
            color: var(--muted);
            font-size: 1.05em;
            margin-top: 6px;
        }

        .forms-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-card {
            background: var(--card);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 18px 40px rgba(31, 42, 55, 0.08);
            border: 1px solid var(--border);
        }

        .form-card h3 {
            margin: 0 0 20px 0;
            font-size: 1.3em;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9em;
            color: var(--muted);
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            background: #fbfdff;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 122, 224, 0.12);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.14s ease, box-shadow 0.14s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(31, 122, 224, 0.25);
        }

        .btn-register {
            background: var(--ok);
        }

        .btn-register:hover {
            box-shadow: 0 8px 16px rgba(31, 159, 88, 0.25);
        }

        .msg {
            margin-top: 12px;
            font-size: 0.9em;
            text-align: center;
            min-height: 20px;
        }

        .success { color: var(--ok); }
        .error { color: var(--danger); }

        @media (max-width: 700px) {
            .forms-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="logo-section">
        <h1>Tricount</h1>
        <p>Divide gastos con amigos de forma sencilla</p>
    </div>

    <div class="forms-container">
        <form class="form-card" id="formRegistro">
            <h3>Crear cuenta</h3>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="regNombre" placeholder="Tu nombre" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary btn-register">Crear cuenta</button>
            <div id="msgRegistro" class="msg"></div>
        </form>

        <form class="form-card" id="formLogin">
            <h3>Iniciar sesión</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
            <div id="msgLogin" class="msg"></div>
        </form>
    </div>
</div>

<script>
    document.getElementById('formRegistro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msgRegistro');
        msg.className = 'msg';

        const usuario = {
            username: document.getElementById('regNombre').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value
        };

        try {
            const resp = await fetch('/api/usuarios/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(usuario)
            });

            if (resp.ok) {
                msg.textContent = '¡Cuenta creada! Ya puedes iniciar sesión.';
                msg.classList.add('success');
                e.target.reset();
            } else {
                const error = await resp.text();
                msg.textContent = 'Error: ' + error;
                msg.classList.add('error');
            }
        } catch (err) {
            msg.textContent = 'Error de conexión al servidor.';
            msg.classList.add('error');
        }
    });

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msgLogin');
        msg.className = 'msg';

        const loginRequest = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPass').value
        };

        try {
            const resp = await fetch('/api/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginRequest)
            });

            if (resp.ok) {
                const usuario = await resp.json();
                localStorage.setItem('userId', usuario.id);
                localStorage.setItem('username', usuario.username);
                msg.textContent = '¡Bienvenido, ' + usuario.username + '! Redirigiendo...';
                msg.classList.add('success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else {
                const error = await resp.text();
                msg.textContent = 'Error: ' + error;
                msg.classList.add('error');
            }
        } catch (err) {
            msg.textContent = 'Error de conexión al servidor.';
            msg.classList.add('error');
        }
    });
</script>

</body>
</html>
