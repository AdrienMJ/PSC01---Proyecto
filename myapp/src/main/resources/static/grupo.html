<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grupo</title>
    <style>
        :root {
            --bg: #f6f8ff;
            --card: #ffffff;
            --accent: #1f7ae0;
            --accent-soft: #e5f0ff;
            --ok: #1f9f58;
            --danger: #d73a49;
            --text: #1f2a37;
            --muted: #5b6676;
            --border: #dfe5ef;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            background: linear-gradient(145deg, #f4f8ff 0%, #eaf7f1 100%);
            color: var(--text);
        }

        .container {
            max-width: 860px;
            margin: auto;
            background: var(--card);
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(31, 42, 55, 0.08);
        }

        h2, h3 {
            margin-top: 0;
        }

        input,
        select {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }

        button {
            padding: 8px 15px;
            background: var(--ok);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.14s ease, box-shadow 0.14s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .btn-edit {
            background: var(--accent);
        }

        .btn-invitar {
            background: #17a2b8;
        }

        .gasto {
            background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
        }

        .gasto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .monto {
            font-weight: bold;
            color: var(--ok);
        }

        .gasto-top-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.85em;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .tag-categoria {
            background: #fff8e8;
            color: #99600f;
            border-color: #f8db8d;
        }

        .tag-emote {
            background: #eef7ff;
            color: #1f4d7a;
            border-color: #c6ddf7;
        }

        .editar {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mensaje {
            font-size: 0.9em;
            margin-top: 5px;
        }

        .volver {
            margin-bottom: 15px;
            display: inline-block;
            cursor: pointer;
            color: var(--accent);
        }

        .seccion {
            margin-top: 20px;
            padding: 15px;
            background: var(--accent-soft);
            border-radius: 12px;
            border: 1px solid #d2e6ff;
        }

        .miembro {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            margin: 4px;
            font-size: 0.9em;
        }

        .crear-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .crear-grid .full {
            grid-column: 1 / -1;
        }

        .emote-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 8px;
        }

        .emote-btn {
            background: #fff;
            color: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
        }

        .emote-btn.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(31, 122, 224, 0.2);
            background: #f1f7ff;
        }

        .hint {
            color: var(--muted);
            font-size: 0.85em;
            margin: 2px 0 8px;
        }

        @media (max-width: 800px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 16px;
            }

            .crear-grid {
                grid-template-columns: 1fr;
            }

            .emote-grid {
                grid-template-columns: repeat(7, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="container">
    <span class="volver" onclick="volver()">← Volver</span>

    <h2 id="tituloGrupo">Grupo</h2>

    <!-- Sección: Miembros del grupo -->
    <div class="seccion">
        <h3>Miembros</h3>
        <div id="listaMiembros">Cargando miembros...</div>
    </div>

    <!-- Sección: Invitar usuario -->
    <div class="seccion">
        <h3>Invitar persona al grupo</h3>
        <input type="email" id="emailInvitado" placeholder="Email del usuario a invitar">
        <button class="btn-invitar" onclick="invitarUsuario()">Invitar</button>
        <p id="msgInvitar" class="mensaje"></p>
    </div>

    <!-- Sección: Crear gasto -->
    <div class="seccion">
        <h3>Crear gasto</h3>
        <div class="crear-grid">
            <input type="text" id="concepto" placeholder="Concepto">
            <input type="number" id="monto" placeholder="Monto">
            <select id="pagador"></select>
            <select id="categoria"></select>
            <div class="full">
                <div class="hint">Selecciona un emote para este gasto</div>
                <div id="emoteGrid" class="emote-grid"></div>
            </div>
            <button class="full" onclick="crearGasto()">Crear</button>
        </div>
        <p id="msg" class="mensaje"></p>
    </div>

    <!-- Sección: Ordenar gastos -->
    <div class="seccion">
        <h3>Ordenar gastos</h3>
        <label for="ordenar">Ordenar por:</label>
        <select id="ordenar">
            <option value="fecha">Fecha</option>
            <option value="monto">Monto</option>
        </select>
        <select id="direccion">
            <option value="desc">Descendente</option>
            <option value="asc">Ascendente</option>
        </select>
        <button onclick="cargarGastos()">Aplicar</button>
    </div>

    <h3>Gastos</h3>
    <div id="listaGastos"></div>
</div>

<script>
    const CATEGORIAS = [
        { value: 'COMIDA', label: 'Comida' },
        { value: 'TRANSPORTE', label: 'Transporte' },
        { value: 'OCIO', label: 'Ocio' },
        { value: 'VIVIENDA', label: 'Vivienda' },
        { value: 'OTROS', label: 'Otros' }
    ];

    const EMOTES = [
        '🍽️', '🍕', '🍔', '🥗', '☕', '🍺', '🚗', '🚌', '🚕', '🚲',
        '🛴', '⛽', '🎬', '🎮', '🎟️', '🎵', '📚', '🏠', '🛋️', '🧾',
        '🛒', '🧰', '💊', '🏥', '🧼', '🧴', '👕', '🎁', '✈️', '🏨',
        '📱', '💻', '🧪', '🎓', '⚽', '🏋️', '🧳', '📦', '🐶', '🐱',
        '🌮', '🍣', '🍜', '🍩', '🧁', '🚆', '🚇', '🚢', '🛩️', '🅿️'
    ];

    let selectedEmote = '🍽️';

    const params = new URLSearchParams(window.location.search);
    const grupoId = params.get('id');
    const userId = localStorage.getItem('userId');

    if (!grupoId) {
        window.location.href = "dashboard.html";
    }

    window.onload = () => {
        cargarCategorias();
        renderEmotePicker();
        cargarInfoGrupo();
        cargarMiembros();
        cargarGastos();
        cargarUsuariosPagador();
    };

    function cargarCategorias() {
        const select = document.getElementById('categoria');
        select.innerHTML = '';
        CATEGORIAS.forEach(c => {
            const option = document.createElement('option');
            option.value = c.value;
            option.textContent = c.label;
            select.appendChild(option);
        });
    }

    function renderEmotePicker() {
        const grid = document.getElementById('emoteGrid');
        grid.innerHTML = '';
        EMOTES.forEach(emote => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = `emote-btn${selectedEmote === emote ? ' selected' : ''}`;
            btn.textContent = emote;
            btn.title = `Seleccionar ${emote}`;
            btn.onclick = () => {
                selectedEmote = emote;
                renderEmotePicker();
            };
            grid.appendChild(btn);
        });
    }

    function categoriaLabel(categoria) {
        const encontrada = CATEGORIAS.find(c => c.value === categoria);
        return encontrada ? encontrada.label : 'Otros';
    }

    function volver() {
        window.location.href = "dashboard.html";
    }

    async function cargarInfoGrupo() {
        // Usamos el endpoint de usuarios del grupo para obtener el nombre del grupo
        // o podríamos crear uno nuevo. Por ahora ponemos el id.
        document.getElementById('tituloGrupo').textContent = "Grupo #" + grupoId;
    }

    async function cargarMiembros() {
        const cont = document.getElementById('listaMiembros');
        try {
            const resp = await fetch(`/api/grupos/${grupoId}/usuarios`);
            if (!resp.ok) throw new Error("Error cargando miembros");
            const miembros = await resp.json();

            if (miembros.length === 0) {
                cont.innerHTML = "<p>No hay miembros.</p>";
                return;
            }

            cont.innerHTML = "";
            miembros.forEach(m => {
                cont.innerHTML += `<span class="miembro">${m.username} (${m.email})</span>`;
            });
        } catch (err) {
            cont.innerHTML = "Error cargando miembros";
        }
    }

    async function invitarUsuario() {
        const email = document.getElementById('emailInvitado').value.trim();
        const msg = document.getElementById('msgInvitar');

        if (!email) {
            msg.textContent = "Introduce el email del usuario a invitar";
            msg.style.color = "red";
            return;
        }

        const payload = {
            email: email,
            idUsuarioInvitador: Number(userId)
        };

        try {
            const resp = await fetch(`/api/grupos/${grupoId}/invitar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                msg.textContent = "¡Usuario invitado con éxito!";
                msg.style.color = "green";
                document.getElementById('emailInvitado').value = "";
                cargarMiembros();       // Refresca la lista de miembros
                cargarUsuariosPagador(); // Refresca el select de pagador
            } else {
                const error = await resp.text();
                msg.textContent = "Error: " + error;
                msg.style.color = "red";
            }
        } catch (err) {
            msg.textContent = "Error de conexión al servidor.";
            msg.style.color = "red";
        }
    }

    async function cargarGastos() {
        const cont = document.getElementById('listaGastos');
        const ordenar = document.getElementById('ordenar').value;
        const direccion = document.getElementById('direccion').value;

        try {
            const resp = await fetch(`/api/gastos/grupo/${grupoId}?ordenar=${encodeURIComponent(ordenar)}&direccion=${encodeURIComponent(direccion)}`);
            const gastos = await resp.json();

            cont.innerHTML = "";

            if (gastos.length === 0) {
                cont.innerHTML = "<p>No hay gastos todavía.</p>";
                return;
            }

            gastos.forEach(g => {
                const pagadorNombre = g.pagador ? g.pagador.username : 'Sin pagador';
                const fecha = g.fecha ? new Date(g.fecha).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' }) : '';
                const categoria = g.categoria || 'OTROS';
                const emote = g.emote || '🧾';
                const esPagador = g.pagador && g.pagador.id === Number(userId);
                const estadoTexto = g.pagado
                    ? 'Pagado'
                    : esPagador
                        ? 'Eres quien pagó este gasto'
                        : `Deuda pendiente: ${g.monto}€`;
                const balanceTexto = g.pagado
                    ? 'Balance actual: 0€'
                    : (esPagador ? '' : `Tu balance: ${g.monto}€`);
                const actionButton = (!g.pagado && !esPagador)
                    ? `<button class="btn-edit" onclick="marcarGastoPagado(${g.id})">Marcar como pagado</button>`
                    : '';

                cont.innerHTML += `
                    <div class="gasto">
                        <div class="gasto-header">
                            <span>${g.concepto} (pagado por ${pagadorNombre})</span>
                            <span class="monto">${g.monto}€</span>
                        </div>
                        <div class="gasto-top-row">
                            <span class="tag tag-categoria">🏷️ ${categoriaLabel(categoria)}</span>
                            <span class="tag tag-emote">${emote} Emote</span>
                        </div>
                        <div>Fecha: ${fecha}</div>
                        <div>${estadoTexto}</div>
                        ${balanceTexto ? `<div>${balanceTexto}</div>` : ''}
                        <div class="editar">${actionButton}</div>
                    </div>
                `;
            });

        } catch (err) {
            cont.innerHTML = "Error cargando gastos";
        }
    }

    async function marcarGastoPagado(gastoId) {
        try {
            const resp = await fetch(`/api/gastos/${gastoId}/pagado/${userId}`, {
                method: 'PUT'
            });

            if (resp.ok) {
                cargarGastos();
            } else {
                const error = await resp.text();
                alert('No se pudo marcar como pagado: ' + error);
            }
        } catch (err) {
            alert('Error de conexión al marcar el gasto como pagado');
        }
    }

    async function cargarUsuariosPagador() {
        try {
            // Ahora cargamos solo los miembros del grupo, no todos los usuarios
            const resp = await fetch(`/api/grupos/${grupoId}/usuarios`);
            if (!resp.ok) throw new Error("No se pudieron cargar los miembros");

            const usuarios = await resp.json();
            const select = document.getElementById('pagador');
            select.innerHTML = "";

            if (usuarios.length === 0) {
                const option = document.createElement('option');
                option.value = "";
                option.textContent = "No hay miembros en el grupo";
                select.appendChild(option);
                return;
            }

            usuarios.forEach(u => {
                const option = document.createElement('option');
                option.value = u.id;
                option.textContent = u.username;
                select.appendChild(option);
            });

        } catch (err) {
            console.error("Error cargando miembros para pagador", err);
        }
    }

    async function crearGasto() {
        const concepto = document.getElementById('concepto').value.trim();
        const monto = parseFloat(document.getElementById('monto').value);
        const categoria = document.getElementById('categoria').value;
        const msg = document.getElementById('msg');
        const pagadorId = document.getElementById('pagador').value;

        if (!concepto || !monto || !categoria || !selectedEmote) {
            msg.textContent = "Rellena todos los campos";
            msg.style.color = "red";
            return;
        }

        const payload = {
            concepto: concepto,
            monto: monto,
            categoria: categoria,
            emote: selectedEmote,
            pagador: { id: Number(pagadorId) },
            grupo: { id: Number(grupoId) }
        };

        try {
            const resp = await fetch('/api/gastos/crear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                msg.textContent = "Gasto añadido";
                msg.style.color = "green";
                document.getElementById('concepto').value = "";
                document.getElementById('monto').value = "";
                document.getElementById('categoria').value = 'COMIDA';
                selectedEmote = '🍽️';
                renderEmotePicker();
                cargarGastos();
            } else {
                const error = await resp.text();
                msg.textContent = "Error al crear gasto: " + error;
                msg.style.color = "red";
            }
        } catch {
            msg.textContent = "Error de conexión";
            msg.style.color = "red";
        }
    }
</script>

</body>
</html>
